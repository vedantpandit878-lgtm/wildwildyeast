services:
  - type: web
    name: wildwildyeast-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wildwildyeast-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

databases:
  - name: wildwildyeast-db
    databaseName: wildwildyeast
    user: wildwildyeast
